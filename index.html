<!DOCTYPE html>
<html>
<head>
    <title>Crop Prediction</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">
<div class="container">

    <!-- Title -->
    <h2>🌾 Crop Prediction</h2>

    <!-- 🌍 LOCATION + WEATHER -->
    <div class="top-section">
        <div id="map"></div>
        <div id="weatherBox">📍 Detecting location & weather...</div>
    </div>

    <!-- 🎛 INPUT SECTION -->
    <div class="inputs">

        <div class="field">
            <div class="label-row">
                <label>Nitrogen</label>
                <span id="N_val">50</span>
            </div>
            <input type="range" id="N" min="0" max="150" value="50">
        </div>

        <div class="field">
            <div class="label-row">
                <label>Phosphorus</label>
                <span id="P_val">50</span>
            </div>
            <input type="range" id="P" min="0" max="150" value="50">
        </div>

        <div class="field">
            <div class="label-row">
                <label>Potassium</label>
                <span id="K_val">50</span>
            </div>
            <input type="range" id="K" min="0" max="150" value="50">
        </div>

        <div class="field">
            <div class="label-row">
                <label>Temperature (°C)</label>
                <span id="temp_val">25</span>
            </div>
            <input type="range" id="temperature" min="0" max="50" value="25">
        </div>

        <div class="field">
            <div class="label-row">
                <label>Humidity (%)</label>
                <span id="hum_val">60</span>
            </div>
            <input type="range" id="humidity" min="0" max="100" value="60">
        </div>

        <div class="field">
            <div class="label-row">
                <label>pH Level</label>
                <span id="ph_val">6.5</span>
            </div>
            <input type="range" id="ph" min="0" max="14" step="0.1" value="6.5">
        </div>

        <div class="field">
            <div class="label-row">
                <label>Rainfall (mm)</label>
                <span id="rain_val">100</span>
            </div>
            <input type="range" id="rainfall" min="0" max="300" value="100">
        </div>

    </div>

    <!-- 🔵 BUTTON -->
    <button onclick="predict()">🚀 Predict Crop</button>

    <!-- 📊 RESULT -->
    <div id="result"></div>

    <!-- 💡 Footer Hint -->
    <div class="hint">
        Adjust sliders or use live weather data for better predictions
    </div>

</div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
